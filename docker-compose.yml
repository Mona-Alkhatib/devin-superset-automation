services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./data:/data
    depends_on:
      - api
    restart: unless-stopped
