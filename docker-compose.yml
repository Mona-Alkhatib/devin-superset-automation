services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./data:/data
    depends_on:
      - api
    restart: unless-stopped
